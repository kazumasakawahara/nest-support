<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>支援記録 - nest-support</title>
<link rel="stylesheet" href="/static/shared.css">
</head>
<body>
<div class="container">
    <a href="/" class="nav-back">&larr; メニューに戻る</a>
    <h1 style="font-size:20px; margin: 8px 0 16px;">支援記録を入力</h1>

    <form id="record-form">
        <!-- クライアント選択 -->
        <div class="card">
            <div class="form-group">
                <label>クライアント名</label>
                <select id="clientName" required>
                    <option value="">選択してください</option>
                </select>
            </div>
            <div class="form-group">
                <label>記録者（あなたの名前）</label>
                <input type="text" id="supporterName" placeholder="例: 鈴木" required>
            </div>
            <div class="form-group">
                <label>日付</label>
                <input type="date" id="logDate" required>
            </div>
        </div>

        <!-- 状況と対応 -->
        <div class="card">
            <div class="form-group">
                <label>場面</label>
                <div class="hint">どんな場面でしたか？</div>
                <div class="chip-group" id="situationChips">
                    <span class="chip" data-value="食事">食事</span>
                    <span class="chip" data-value="作業">作業</span>
                    <span class="chip" data-value="入浴">入浴</span>
                    <span class="chip" data-value="散歩">散歩</span>
                    <span class="chip" data-value="他者交流">他者交流</span>
                    <span class="chip" data-value="就寝">就寝</span>
                    <span class="chip" data-value="移動">移動</span>
                    <span class="chip" data-value="その他">その他</span>
                </div>
                <input type="hidden" id="situation" required>
            </div>

            <div class="form-group">
                <label>対応内容</label>
                <div class="hint">何をしましたか？</div>
                <textarea id="action" placeholder="例: 静かな別室に移動させた" required></textarea>
            </div>
        </div>

        <!-- 感情と効果 -->
        <div class="card">
            <div class="form-group">
                <label>ご本人の感情</label>
                <div class="hint">一番近いものを選んでください</div>
                <div class="chip-group" id="emotionChips">
                    <span class="chip" data-value="Joy" style="--c:#FFD700">&#128522; 嬉しい</span>
                    <span class="chip" data-value="Calm" style="--c:#66BB6A">&#128524; 穏やか</span>
                    <span class="chip" data-value="Anger" style="--c:#FF5252">&#128544; 怒り</span>
                    <span class="chip" data-value="Sadness" style="--c:#42A5F5">&#128546; 悲しみ</span>
                    <span class="chip" data-value="Fear" style="--c:#AB47BC">&#128552; 恐怖</span>
                    <span class="chip" data-value="Anxiety" style="--c:#FF7043">&#128556; 不安</span>
                    <span class="chip" data-value="Neutral" style="--c:#9E9E9E">&#128528; 普通</span>
                </div>
                <input type="hidden" id="emotion" required>
            </div>

            <div class="form-group">
                <label>対応の効果</label>
                <div class="chip-group" id="effectivenessChips">
                    <span class="chip" data-value="Effective">&#9989; 効果的</span>
                    <span class="chip" data-value="Neutral">&#10134; どちらでもない</span>
                    <span class="chip" data-value="Ineffective">&#10060; 効果なし</span>
                </div>
                <input type="hidden" id="effectiveness" required>
            </div>
        </div>

        <!-- きっかけと文脈 -->
        <div class="card">
            <div class="form-group">
                <label>きっかけ（任意）</label>
                <div class="hint">何がきっかけでしたか？</div>
                <div class="chip-group" id="triggerChips">
                    <span class="chip" data-value="大きな音">大きな音</span>
                    <span class="chip" data-value="環境変化">環境変化</span>
                    <span class="chip" data-value="人間関係">人間関係</span>
                    <span class="chip" data-value="体調不良">体調不良</span>
                    <span class="chip" data-value="スケジュール変更">予定変更</span>
                    <span class="chip" data-value="感覚過敏">感覚過敏</span>
                </div>
                <input type="text" id="triggerTag" placeholder="または自由入力" style="margin-top:8px;">
            </div>

            <div class="form-group">
                <label>背景メモ（任意）</label>
                <textarea id="context" placeholder="例: 隣のフロアで工事が始まった"></textarea>
            </div>
        </div>

        <button type="submit" class="btn btn-primary" id="submitBtn">
            記録を登録する
        </button>
        <div class="spinner" id="spinner"></div>
    </form>
</div>

<div class="toast toast-success" id="toast-ok">登録しました</div>
<div class="toast toast-error" id="toast-err">エラーが発生しました</div>

<script>
// 今日の日付をデフォルトに
document.getElementById('logDate').value = new Date().toISOString().split('T')[0];

// クライアント一覧を取得
fetch('/api/clients')
    .then(r => r.json())
    .then(clients => {
        const sel = document.getElementById('clientName');
        clients.forEach(name => {
            const opt = document.createElement('option');
            opt.value = name;
            opt.textContent = name;
            sel.appendChild(opt);
        });
    });

// 記録者名をローカルストレージから復元
const savedName = localStorage.getItem('supporterName');
if (savedName) document.getElementById('supporterName').value = savedName;

// チップ選択ロジック
document.querySelectorAll('.chip-group').forEach(group => {
    group.querySelectorAll('.chip').forEach(chip => {
        chip.addEventListener('click', () => {
            // 同じグループ内のチップを解除
            group.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
            chip.classList.toggle('selected');

            // hidden input に値をセット
            const hiddenId = group.id.replace('Chips', '');
            const hidden = document.getElementById(hiddenId);
            if (hidden) hidden.value = chip.dataset.value;

            // triggerTag はテキスト入力にも反映
            if (hiddenId === 'trigger') {
                document.getElementById('triggerTag').value = chip.dataset.value;
            }
        });
    });
});

// フォーム送信
document.getElementById('record-form').addEventListener('submit', async (e) => {
    e.preventDefault();

    const btn = document.getElementById('submitBtn');
    const spinner = document.getElementById('spinner');
    btn.disabled = true;
    spinner.style.display = 'block';

    // 記録者名を保存
    localStorage.setItem('supporterName', document.getElementById('supporterName').value);

    const body = {
        clientName: document.getElementById('clientName').value,
        supporterName: document.getElementById('supporterName').value,
        date: document.getElementById('logDate').value,
        situation: document.getElementById('situation').value,
        action: document.getElementById('action').value,
        effectiveness: document.getElementById('effectiveness').value,
        emotion: document.getElementById('emotion').value,
        triggerTag: document.getElementById('triggerTag').value,
        context: document.getElementById('context').value,
    };

    try {
        const res = await fetch('/api/support-log', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
        });
        if (!res.ok) throw new Error('Server error');

        showToast('toast-ok');
        // フォームリセット（クライアント名と記録者名は維持）
        document.getElementById('action').value = '';
        document.getElementById('context').value = '';
        document.querySelectorAll('.chip.selected').forEach(c => c.classList.remove('selected'));
        ['situation', 'emotion', 'effectiveness'].forEach(id => document.getElementById(id).value = '');
    } catch (err) {
        showToast('toast-err');
    } finally {
        btn.disabled = false;
        spinner.style.display = 'none';
    }
});

function showToast(id) {
    const el = document.getElementById(id);
    el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 2500);
}
</script>
</body>
</html>

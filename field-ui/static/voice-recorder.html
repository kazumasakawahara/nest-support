<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>声の記録 - nest-support</title>
<link rel="stylesheet" href="/static/shared.css">
<style>
    .status-text { text-align: center; font-size: 16px; margin: 12px 0; min-height: 24px; }
    .timer { text-align: center; font-size: 48px; font-weight: bold; color: var(--danger); font-variant-numeric: tabular-nums; }
    .result-section { margin-top: 16px; }
    .transcript-box { background: #f9f9f9; border-radius: 8px; padding: 12px; font-size: 14px; line-height: 1.8; max-height: 200px; overflow-y: auto; }
    .step-indicator { display: flex; justify-content: center; gap: 8px; margin: 16px 0; }
    .step-dot { width: 10px; height: 10px; border-radius: 50%; background: #ddd; }
    .step-dot.active { background: var(--primary); }
    .step-dot.done { background: var(--success); }
</style>
</head>
<body>
<div class="container">
    <a href="/" class="nav-back">&larr; メニューに戻る</a>
    <h1 style="font-size:20px; margin: 8px 0 16px;">声の記録</h1>

    <!-- クライアント選択 -->
    <div class="card">
        <div class="form-group">
            <label>クライアント名</label>
            <select id="clientName" required>
                <option value="">選択してください</option>
            </select>
        </div>
        <div class="form-group">
            <label>記録者（任意）</label>
            <input type="text" id="supporterName" placeholder="例: 鈴木">
        </div>
    </div>

    <!-- 録音エリア -->
    <div class="card" style="text-align:center;">
        <div class="step-indicator">
            <div class="step-dot" id="step1"></div>
            <div class="step-dot" id="step2"></div>
            <div class="step-dot" id="step3"></div>
        </div>

        <div class="status-text" id="statusText">ボタンを押して録音開始</div>
        <div class="timer" id="timer" style="display:none;">0:00</div>

        <div class="record-btn" id="recordBtn" onclick="toggleRecording()">
            <span id="btnIcon">&#9899;</span>
        </div>

        <p style="font-size:13px; color:var(--text-light);">
            押す → 話す → もう一度押す
        </p>
    </div>

    <!-- 処理中 -->
    <div id="processing" style="display:none;">
        <div class="card" style="text-align:center;">
            <div class="spinner" style="display:block; margin-bottom:12px;"></div>
            <p id="processingText">音声を処理中...</p>
        </div>
    </div>

    <!-- 結果 -->
    <div id="resultSection" style="display:none;">
        <div class="card">
            <h2 style="font-size:16px; margin-bottom:8px; color:var(--success);">登録完了</h2>
            <p style="font-size:14px; margin-bottom:12px;">
                <span id="resultNodes">-</span>件のデータが登録されました
            </p>
            <h3 style="font-size:14px; color:var(--text-light); margin-bottom:8px;">文字起こし結果:</h3>
            <div class="transcript-box" id="transcriptBox"></div>
        </div>
        <button class="btn btn-primary" onclick="resetRecorder()">
            次の記録へ
        </button>
    </div>

    <!-- エラー -->
    <div id="errorSection" style="display:none;">
        <div class="card" style="border-left: 3px solid var(--danger);">
            <h2 style="font-size:16px; color:var(--danger); margin-bottom:8px;">エラー</h2>
            <p id="errorText" style="font-size:14px;"></p>
        </div>
        <button class="btn btn-primary" onclick="resetRecorder()">
            やり直す
        </button>
    </div>
</div>

<script>
let mediaRecorder = null;
let audioChunks = [];
let timerInterval = null;
let seconds = 0;
let isRecording = false;

// クライアント一覧
fetch('/api/clients')
    .then(r => r.json())
    .then(clients => {
        const sel = document.getElementById('clientName');
        clients.forEach(name => {
            const opt = document.createElement('option');
            opt.value = name;
            opt.textContent = name;
            sel.appendChild(opt);
        });
    });

// 記録者名の復元
const savedName = localStorage.getItem('supporterName');
if (savedName) document.getElementById('supporterName').value = savedName;

function setStep(step) {
    ['step1', 'step2', 'step3'].forEach((id, i) => {
        const el = document.getElementById(id);
        el.className = 'step-dot';
        if (i < step - 1) el.classList.add('done');
        if (i === step - 1) el.classList.add('active');
    });
}

async function toggleRecording() {
    if (!document.getElementById('clientName').value) {
        alert('クライアントを選択してください');
        return;
    }

    if (!isRecording) {
        await startRecording();
    } else {
        stopRecording();
    }
}

async function startRecording() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream, { mimeType: getMimeType() });
        audioChunks = [];

        mediaRecorder.ondataavailable = (e) => {
            if (e.data.size > 0) audioChunks.push(e.data);
        };

        mediaRecorder.onstop = () => {
            stream.getTracks().forEach(t => t.stop());
            uploadAudio();
        };

        mediaRecorder.start();
        isRecording = true;

        document.getElementById('recordBtn').classList.add('recording');
        document.getElementById('btnIcon').innerHTML = '&#9632;';
        document.getElementById('statusText').textContent = '録音中... もう一度押して停止';
        document.getElementById('timer').style.display = 'block';
        setStep(2);

        seconds = 0;
        timerInterval = setInterval(() => {
            seconds++;
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            document.getElementById('timer').textContent = `${m}:${s.toString().padStart(2, '0')}`;
        }, 1000);

    } catch (err) {
        alert('マイクへのアクセスが許可されていません。ブラウザの設定を確認してください。');
    }
}

function stopRecording() {
    if (mediaRecorder && mediaRecorder.state === 'recording') {
        mediaRecorder.stop();
    }
    isRecording = false;
    clearInterval(timerInterval);

    document.getElementById('recordBtn').classList.remove('recording');
    document.getElementById('recordBtn').style.display = 'none';
    document.getElementById('timer').style.display = 'none';
    document.getElementById('statusText').textContent = '';
    setStep(3);
}

async function uploadAudio() {
    const processing = document.getElementById('processing');
    processing.style.display = 'block';

    const ext = getMimeType().includes('webm') ? '.webm' : '.mp4';
    const blob = new Blob(audioChunks, { type: getMimeType() });
    const formData = new FormData();
    formData.append('audio', blob, `recording${ext}`);
    formData.append('clientName', document.getElementById('clientName').value);

    const supporter = document.getElementById('supporterName').value;
    if (supporter) {
        formData.append('supporterName', supporter);
        localStorage.setItem('supporterName', supporter);
    }

    try {
        document.getElementById('processingText').textContent = '音声を文字起こし中...';
        const res = await fetch('/api/voice/upload', { method: 'POST', body: formData });

        processing.style.display = 'none';

        if (!res.ok) {
            const err = await res.json();
            showError(err.detail || 'サーバーエラーが発生しました');
            return;
        }

        const result = await res.json();
        document.getElementById('resultNodes').textContent = result.nodes_registered || 0;
        document.getElementById('transcriptBox').textContent = result.transcript || '(文字起こし結果なし)';
        document.getElementById('resultSection').style.display = 'block';

    } catch (err) {
        processing.style.display = 'none';
        showError('通信エラーが発生しました。サーバーが起動しているか確認してください。');
    }
}

function showError(msg) {
    document.getElementById('errorText').textContent = msg;
    document.getElementById('errorSection').style.display = 'block';
}

function resetRecorder() {
    document.getElementById('processing').style.display = 'none';
    document.getElementById('resultSection').style.display = 'none';
    document.getElementById('errorSection').style.display = 'none';
    document.getElementById('recordBtn').style.display = 'flex';
    document.getElementById('btnIcon').innerHTML = '&#9899;';
    document.getElementById('statusText').textContent = 'ボタンを押して録音開始';
    setStep(1);
    isRecording = false;
    audioChunks = [];
}

function getMimeType() {
    if (MediaRecorder.isTypeSupported('audio/webm;codecs=opus')) return 'audio/webm;codecs=opus';
    if (MediaRecorder.isTypeSupported('audio/mp4')) return 'audio/mp4';
    return 'audio/webm';
}

setStep(1);
</script>
</body>
</html>
